<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>OG Image — Amore Mio</title>
<link rel="stylesheet" href="../_ds/amore-mio-design-system-ca732e75-8b1e-4141-b9a9-e8ec8ceb8025/styles.css">
<style>
  html, body { margin: 0; padding: 0; background: #555; }
  .og {
    width: 1200px; height: 630px; background: var(--crema);
    display: grid; grid-template-columns: 55fr 45fr; overflow: hidden;
    font-kerning: normal;
  }
  .left {
    padding: 64px 24px 64px 72px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .mark { display: flex; flex-direction: column; gap: 6px; }
  .mark .name {
    font-family: 'Marcellus', serif; text-transform: uppercase;
    letter-spacing: 0.15em; font-size: 26px; color: var(--espresso);
  }
  .mark .tag {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500;
    font-size: 19px; color: var(--taupe);
  }
  h1 {
    margin: 0; font-family: 'Cormorant Garamond', serif; font-weight: 600;
    font-size: 68px; line-height: 1.08; letter-spacing: -0.01em; color: var(--espresso);
    padding-bottom: 6px;
  }
  h1 em { font-style: italic; }
  .foot { display: flex; align-items: center; gap: 16px; }
  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Satoshi', ui-sans-serif, system-ui, sans-serif; font-weight: 500; font-size: 19px;
    color: var(--crema); background: var(--caramello); border-radius: 999px; padding: 15px 30px;
  }
  .place {
    font-family: 'Satoshi', ui-sans-serif, system-ui, sans-serif; font-size: 17px; color: var(--taupe);
  }
  .right { padding: 12px; }
  .right .ph {
    width: 100%; height: 100%; border-radius: 16px; overflow: hidden;
  }
  .right img { width: 100%; height: 100%; object-fit: cover; display: block; }
</style>
</head>
<body>
<div class="og">
  <div class="left">
    <div class="mark">
      <span class="name">Amore Mio</span>
      <span class="tag">L'Atelier De La Glace</span>
    </div>
    <h1>Gelato <em>artigianale</em>, fait maison chaque jour</h1>
    <div class="foot">
      <span class="pill">
        <svg viewBox="0 0 256 256" width="20" height="20" fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M128 28a100 100 0 0 0-86 150L28 228l52-14A100 100 0 1 0 128 28Z"></path>
          <path d="M96 100c0 40 20 60 60 60l8-20-24-12-12 12a48 48 0 0 1-20-20l12-12-12-24Z"></path>
        </svg>
        Commander sur WhatsApp
      </span>
      <span class="place">La Marsa, Tunis</span>
    </div>
  </div>
  <div class="right">
    <div class="ph"><img src="../assets/photos/4L0A7834.jpg" alt=""></div>
  </div>
</div>
</body>
</html>
